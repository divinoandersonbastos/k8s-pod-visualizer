# ─────────────────────────────────────────────────────────────────────────────
# K8s Pod Visualizer — Azure AKS: ConfigMap + Secret
#
# IMPORTANTE: Substitua os valores marcados com <VALOR> antes de aplicar.
# Nunca commite este arquivo com valores reais no repositório.
#
# Para gerar os valores base64:
#   echo -n "seu-valor" | base64
#
# Para gerar JWT_SECRET seguro:
#   openssl rand -base64 64 | tr -d '\n' | base64
#
# Para obter a LICENSE_KEY:
#   cd license-tools && node generate-license.js --customer "..." --days 365
#   cat license.jwt | base64 | tr -d '\n'
# ─────────────────────────────────────────────────────────────────────────────

---
# ── ConfigMap — variáveis não-sensíveis ───────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-pod-visualizer-config
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
data:
  # Timezone para logs e exibição de datas
  TZ: "America/Sao_Paulo"

  # Intervalo de polling de pods (em ms) — padrão: 5000 (5s)
  POLL_INTERVAL_MS: "5000"

  # Retenção de eventos no SQLite (em dias) — padrão: 30
  EVENT_RETENTION_DAYS: "30"

  # Limite de linhas de log por pod — padrão: 500
  LOG_TAIL_LINES: "500"

  # Habilitar coleta de capacity snapshots — padrão: true
  CAPACITY_ENABLED: "true"

  # Intervalo de snapshots de capacity (em minutos) — padrão: 5
  CAPACITY_INTERVAL_MIN: "5"

  # URL de contato para suporte (exibida na tela de licença expirada)
  SUPPORT_CONTACT: "https://wa.me/5561999529713"

---
# ── Secret — valores sensíveis ────────────────────────────────────────────────
# ATENÇÃO: Substitua os valores <BASE64_...> pelos valores reais em base64.
# Não commite este arquivo com valores reais.
#
# Alternativa recomendada para produção: Azure Key Vault + CSI Driver
# https://learn.microsoft.com/azure/aks/csi-secrets-store-driver
apiVersion: v1
kind: Secret
metadata:
  name: k8s-pod-visualizer-secrets
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
  annotations:
    # Se usar Azure Key Vault CSI Driver, adicione:
    # secrets-store.csi.k8s.io/used: "true"
type: Opaque
data:
  # JWT_SECRET: chave para assinar tokens de autenticação da aplicação
  # Gere com: openssl rand -base64 64 | tr -d '\n' | base64
  JWT_SECRET: "<BASE64_JWT_SECRET>"

  # LICENSE_KEY: conteúdo do arquivo license.jwt em base64
  # Gere com: cat license-tools/license.jwt | base64 | tr -d '\n'
  LICENSE_KEY: "<BASE64_LICENSE_KEY>"

# ─────────────────────────────────────────────────────────────────────────────
# ALTERNATIVA: Azure Key Vault CSI Driver (recomendado para produção)
# ─────────────────────────────────────────────────────────────────────────────
# Se preferir usar Azure Key Vault para gerenciar os secrets:
#
# 1. Instale o CSI Driver:
#    helm repo add csi-secrets-store-provider-azure \
#      https://azure.github.io/secrets-store-csi-driver-provider-azure/charts
#    helm install csi-secrets-store-provider-azure \
#      csi-secrets-store-provider-azure/csi-secrets-store-provider-azure \
#      --namespace kube-system
#
# 2. Crie os secrets no Key Vault:
#    az keyvault secret set --vault-name <VAULT_NAME> \
#      --name k8s-viz-jwt-secret --value "$(openssl rand -base64 64)"
#    az keyvault secret set --vault-name <VAULT_NAME> \
#      --name k8s-viz-license-key --value "$(cat license-tools/license.jwt)"
#
# 3. Crie o SecretProviderClass (veja deploy/azure/03-keyvault-csi.yaml)
# ─────────────────────────────────────────────────────────────────────────────
