# ─────────────────────────────────────────────────────────────────────────────
# K8s Pod Visualizer — Base: Deployment + Service
#
# Este arquivo é um TEMPLATE. Não aplique diretamente.
# Use os arquivos de cada ambiente em:
#   deploy/cloud/azure/
#   deploy/onpremises/hostpath/
#   deploy/onpremises/nfs/
#   deploy/onpremises/longhorn/
#
# Cada ambiente inclui este deployment com o volumeMount e volume corretos.
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
    app.kubernetes.io/version: "1.3.2"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  # IMPORTANTE: manter replicas: 1 quando usar ReadWriteOnce (Azure Disk, hostPath, Longhorn)
  # Para ReadWriteMany (NFS, Azure Files), pode aumentar para 2+
  replicas: 1
  selector:
    matchLabels:
      app: k8s-pod-visualizer
  template:
    metadata:
      labels:
        app: k8s-pod-visualizer
        app.kubernetes.io/name: k8s-pod-visualizer
    spec:
      serviceAccountName: k8s-pod-visualizer
      # Segurança: roda como usuário não-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: k8s-pod-visualizer
          # Substitua pela sua imagem após o build:
          # image: seu-registry/k8s-pod-visualizer:1.3.2
          image: ghcr.io/divinoandersonbastos/k8s-pod-visualizer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            - name: USE_SERVICE_ACCOUNT
              value: "true"
            # Diretório onde o SQLite será criado (deve coincidir com o mountPath do volume)
            - name: DATA_DIR
              value: "/app/data"
          # volumeMounts — definido em cada arquivo de ambiente
          # volumeMounts:
          #   - name: visualizer-data
          #     mountPath: /app/data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      # volumes — definido em cada arquivo de ambiente
      # volumes:
      #   - name: visualizer-data
      #     ...
      restartPolicy: Always

---
# Service — expõe o visualizador
apiVersion: v1
kind: Service
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
spec:
  selector:
    app: k8s-pod-visualizer
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
      nodePort: 30080
  type: NodePort

---
