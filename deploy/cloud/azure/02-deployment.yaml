# ─────────────────────────────────────────────────────────────────────────────
# K8s Pod Visualizer — Cloud / Azure: Deployment completo com PVC
#
# Inclui volumeMount do Azure Disk para persistência do SQLite em /app/data.
#
# Ordem de aplicação:
#   kubectl apply -f deploy/base/00-namespace-rbac.yaml
#   kubectl apply -f deploy/cloud/azure/00-storage-class.yaml
#   kubectl apply -f deploy/cloud/azure/01-pvc.yaml
#   kubectl apply -f deploy/cloud/azure/02-deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
    app.kubernetes.io/version: "1.3.2"
    deploy.environment: "cloud-azure"
spec:
  replicas: 1
  # IMPORTANTE: manter replicas: 1 com Azure Disk (ReadWriteOnce).
  # Para alta disponibilidade, migre para Azure Files (ReadWriteMany).
  selector:
    matchLabels:
      app: k8s-pod-visualizer
  template:
    metadata:
      labels:
        app: k8s-pod-visualizer
        app.kubernetes.io/name: k8s-pod-visualizer
    spec:
      serviceAccountName: k8s-pod-visualizer
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: k8s-pod-visualizer
          image: ghcr.io/divinoandersonbastos/k8s-pod-visualizer:latest
          # Para usar imagem própria:
          # image: divand/k8s-pod-visualizer:1.3.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            - name: USE_SERVICE_ACCOUNT
              value: "true"
            - name: DATA_DIR
              value: "/app/data"
            # Opcional: nome do cluster exibido no header
            # - name: CLUSTER_NAME
            #   value: "meu-cluster-aks"
          volumeMounts:
            - name: visualizer-data
              mountPath: /app/data
              # O SQLite será criado em /app/data/events.db
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: visualizer-data
          persistentVolumeClaim:
            claimName: k8s-visualizer-data
      restartPolicy: Always

---
# Service — NodePort para acesso direto
apiVersion: v1
kind: Service
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
spec:
  selector:
    app: k8s-pod-visualizer
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
      nodePort: 30080
  type: NodePort

---
