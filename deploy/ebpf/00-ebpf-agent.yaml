# ── eBPF Network Flow Agent — DaemonSet ──────────────────────────────────────
# Implanta um agente por node para captura de fluxos de rede via eBPF
# Compatível com qualquer CNI (Azure CNI, Flannel, Calico, etc.)
# Requer: kernel >= 4.18, AKS com Ubuntu node pool
#
# Aplicar: kubectl apply -f deploy/ebpf/00-ebpf-agent.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-pod-visualizer
---
# ServiceAccount com permissões para listar pods de todos os namespaces
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebpf-agent
  namespace: k8s-pod-visualizer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ebpf-agent
rules:
  # Necessário para resolver IPs → pods/namespaces
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # Necessário para ler metadados de deployments
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ebpf-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ebpf-agent
subjects:
  - kind: ServiceAccount
    name: ebpf-agent
    namespace: k8s-pod-visualizer
---
# Service para expor o agente internamente (um por node via headless)
apiVersion: v1
kind: Service
metadata:
  name: ebpf-agent
  namespace: k8s-pod-visualizer
  labels:
    app: ebpf-agent
spec:
  clusterIP: None  # Headless — acesso direto aos pods individuais
  selector:
    app: ebpf-agent
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
---
# DaemonSet — um pod por node
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-agent
  namespace: k8s-pod-visualizer
  labels:
    app: ebpf-agent
    component: network-observability
spec:
  selector:
    matchLabels:
      app: ebpf-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ebpf-agent
        component: network-observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ebpf-agent
      hostNetwork: true      # Necessário para ver tráfego de rede do host
      hostPID: true          # Necessário para correlacionar PIDs com pods
      dnsPolicy: ClusterFirstWithHostNet

      # Tolerações para rodar em todos os nodes (incluindo masters e tainted)
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        # AKS spot nodes
        - key: kubernetes.azure.com/scalesetpriority
          value: spot
          effect: NoSchedule
          operator: Equal

      # Prioridade alta para não ser evictado
      priorityClassName: system-node-critical

      initContainers:
        # Verificar suporte a eBPF no kernel
        - name: check-kernel
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              KERNEL=$(uname -r)
              echo "Kernel: $KERNEL"
              # Verificar se BTF está disponível (necessário para CO-RE)
              if [ -f /sys/kernel/btf/vmlinux ]; then
                echo "BTF disponível — eBPF CO-RE suportado"
              else
                echo "BTF não disponível — usando fallback /proc/net/tcp"
              fi
          securityContext:
            privileged: true
          volumeMounts:
            - name: sys
              mountPath: /sys

      containers:
        - name: ebpf-agent
          # Substituir pela imagem do seu registry após build
          # docker build -t SEU_REGISTRY/ebpf-agent:v3.9.0 ./ebpf-agent
          # docker push SEU_REGISTRY/ebpf-agent:v3.9.0
          image: centraldevops/ebpf-agent:v3.9.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 9090
              hostPort: 9090  # Expor na porta do host para acesso direto

          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: AGENT_PORT
              value: "9090"
            # Modo de captura: "ebpf" (padrão) | "proc" (fallback sem eBPF)
            - name: CAPTURE_MODE
              value: "ebpf"
            # Janela de retenção de fluxos em memória
            - name: FLOW_MAX_AGE_MINUTES
              value: "5"

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          # Capacidades necessárias para eBPF
          securityContext:
            privileged: true  # Necessário para kprobes e acesso ao kernel
            capabilities:
              add:
                - NET_ADMIN       # Manipular interfaces de rede
                - SYS_ADMIN       # Carregar programas eBPF
                - SYS_PTRACE      # Acessar /proc de outros processos
                - NET_RAW         # Captura de pacotes raw
                - BPF             # Operações eBPF (kernel >= 5.8)
                - PERFMON         # Acesso a perf events (kernel >= 5.8)

          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: debugfs
              mountPath: /sys/kernel/debug
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: bpffs
              mountPath: /sys/fs/bpf

          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: sys
          hostPath:
            path: /sys
        - name: proc
          hostPath:
            path: /proc
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: DirectoryOrCreate
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
        - name: bpffs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
