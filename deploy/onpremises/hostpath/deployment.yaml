# ─────────────────────────────────────────────────────────────────────────────
# K8s Pod Visualizer — On-Premises: hostPath (mais simples)
#
# Usa um diretório do node físico como volume. Ideal para:
#   - Ambientes de teste / homologação
#   - Clusters com 1 node de monitoramento dedicado
#   - Instalações rápidas sem infraestrutura de storage
#
# PRÉ-REQUISITO: criar o diretório no node antes de aplicar:
#   ssh <node-monitoramento>
#   mkdir -p /opt/k8s-visualizer/data
#   chmod 777 /opt/k8s-visualizer/data
#
# LIMITAÇÃO: se o pod for agendado em outro node, os dados ficam para trás.
# Por isso o nodeSelector é OBRIGATÓRIO — ajuste o hostname abaixo.
#
# Ordem de aplicação:
#   kubectl apply -f deploy/base/00-namespace-rbac.yaml
#   kubectl apply -f deploy/onpremises/hostpath/deployment.yaml
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
    app.kubernetes.io/version: "1.3.2"
    deploy.environment: "onpremises-hostpath"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-pod-visualizer
  template:
    metadata:
      labels:
        app: k8s-pod-visualizer
        app.kubernetes.io/name: k8s-pod-visualizer
    spec:
      serviceAccountName: k8s-pod-visualizer
      # ── OBRIGATÓRIO: fixar no node que tem o diretório /opt/k8s-visualizer/data ──
      nodeSelector:
        kubernetes.io/hostname: SUBSTITUA-PELO-HOSTNAME-DO-NODE
        # Exemplo: kubernetes.io/hostname: worker-node-01
        # Para descobrir o hostname: kubectl get nodes -o wide
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: k8s-pod-visualizer
          image: ghcr.io/divinoandersonbastos/k8s-pod-visualizer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            - name: USE_SERVICE_ACCOUNT
              value: "true"
            - name: DATA_DIR
              value: "/app/data"
          volumeMounts:
            - name: visualizer-data
              mountPath: /app/data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/pods
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: visualizer-data
          hostPath:
            path: /opt/k8s-visualizer/data
            # DirectoryOrCreate: cria o diretório se não existir
            # Porém o fsGroup 1000 pode não ter permissão — prefira criar manualmente
            type: DirectoryOrCreate
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
spec:
  selector:
    app: k8s-pod-visualizer
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
      nodePort: 30080
  type: NodePort
