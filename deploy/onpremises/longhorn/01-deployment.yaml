# ─────────────────────────────────────────────────────────────────────────────
# K8s Pod Visualizer — On-Premises: Longhorn — Deployment
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
    app.kubernetes.io/version: "1.3.2"
    deploy.environment: "onpremises-longhorn"
spec:
  replicas: 1
  # Longhorn com ReadWriteOnce: manter replicas: 1.
  # O Longhorn replica os dados internamente entre nodes — se o node cair,
  # o pod é reagendado em outro node e o volume é re-anexado automaticamente.
  selector:
    matchLabels:
      app: k8s-pod-visualizer
  template:
    metadata:
      labels:
        app: k8s-pod-visualizer
        app.kubernetes.io/name: k8s-pod-visualizer
    spec:
      serviceAccountName: k8s-pod-visualizer
      # Sem nodeSelector: o Longhorn garante que o volume acompanha o pod
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: k8s-pod-visualizer
          image: ghcr.io/divinoandersonbastos/k8s-pod-visualizer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            - name: USE_SERVICE_ACCOUNT
              value: "true"
            - name: DATA_DIR
              value: "/app/data"
          volumeMounts:
            - name: visualizer-data
              mountPath: /app/data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/pods
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: visualizer-data
          persistentVolumeClaim:
            claimName: k8s-visualizer-data
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
spec:
  selector:
    app: k8s-pod-visualizer
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
      nodePort: 30080
  type: NodePort
