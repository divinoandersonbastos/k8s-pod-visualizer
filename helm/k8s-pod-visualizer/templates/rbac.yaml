{{- if .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-pod-visualizer.serviceAccountName" . }}
  namespace: {{ include "k8s-pod-visualizer.namespace" . }}
  labels:
    {{- include "k8s-pod-visualizer.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-pod-visualizer.fullname" . }}
  labels:
    {{- include "k8s-pod-visualizer.labels" . | nindent 4 }}
rules:
  # Pods e logs
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Nodes
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  # Eventos (OOMKill, Spot Eviction, etc.)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Metrics Server — pods
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Metrics Server — nodes
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-pod-visualizer.fullname" . }}
  labels:
    {{- include "k8s-pod-visualizer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-pod-visualizer.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-pod-visualizer.serviceAccountName" . }}
    namespace: {{ include "k8s-pod-visualizer.namespace" . }}
{{- end }}
