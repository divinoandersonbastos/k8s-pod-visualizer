apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-pod-visualizer.fullname" . }}
  namespace: {{ include "k8s-pod-visualizer.namespace" . }}
  labels:
    {{- include "k8s-pod-visualizer.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort | default 8080 }}
      protocol: TCP
      name: http
  selector:
    {{- include "k8s-pod-visualizer.selectorLabels" . | nindent 4 }}
