# =============================================================================
# K8s Pod Visualizer v3.0 — Manifesto de Deploy SEM Persistência de Dados
# =============================================================================
#
# Instalação rápida (uma linha):
#   kubectl apply -f deploy-no-persistence.yaml
#
# ⚠️  ANTES DE APLICAR: gere um JWT_SECRET seguro e atualize o Secret abaixo:
#   kubectl create secret generic k8s-pod-visualizer-secrets \
#     --from-literal=jwt-secret="$(openssl rand -hex 32)" \
#     -n k8s-pod-visualizer --dry-run=client -o yaml | kubectl apply -f -
#
# Acesso via NodePort:
#   http://<IP-DO-NODE>:30080
#
# Acesso via port-forward:
#   kubectl port-forward svc/k8s-pod-visualizer 8080:80 -n k8s-pod-visualizer
#   http://localhost:8080
#
# Funcionalidades disponíveis SEM persistência:
#   ✓ Autenticação JWT (perfis SRE e Squad)
#   ✓ Visualização de pods em tempo real (bolha, cometa, aquário, mapa de calor)
#   ✓ Filtros por namespace, node, deployment, status
#   ✓ Deploy Monitor (rollouts, condições, eventos K8s)
#   ✓ Capacity Planning (node-pools, CPU/MEM, scoring SRE)
#   ✓ Node Monitor (pressão de memória, OOMKill, Spot VMs)
#   ✓ Alertas de recursos e eventos críticos
#   ✓ Personalização visual completa (temas, cores, estilos de bolha)
#   ✓ Editor de recursos YAML (SRE)
#   ✓ Integração de Trace Jaeger/Tempo (Squad)
#   ✗ Histórico de eventos (requer SQLite)
#   ✗ Gráfico de tendência 24h de capacity (requer SQLite)
#
# =============================================================================

---
# 1. Namespace dedicado
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
    app.kubernetes.io/version: "3.0.2"
    app.kubernetes.io/managed-by: kubectl

---
# 2. Secret — JWT_SECRET para autenticação (ALTERE o valor antes de aplicar!)
#
# Gere um valor seguro com:
#   openssl rand -hex 32
#
# Para atualizar após o deploy:
#   kubectl patch secret k8s-pod-visualizer-secrets \
#     -n k8s-pod-visualizer \
#     --type=json \
#     -p='[{"op":"replace","path":"/stringData/jwt-secret","value":"NOVO_SECRET"}]'
#   kubectl rollout restart deployment/k8s-pod-visualizer -n k8s-pod-visualizer
#
apiVersion: v1
kind: Secret
metadata:
  name: k8s-pod-visualizer-secrets
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
type: Opaque
stringData:
  # ⚠️  SUBSTITUA pelo valor gerado com: openssl rand -hex 32
  jwt-secret: "SUBSTITUA_POR_UM_SECRET_SEGURO_openssl_rand_hex_32"

---
# 3. ServiceAccount — identidade do pod dentro do cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
automountServiceAccountToken: true

---
# 4. ClusterRole — permissões de leitura + escrita limitada para Editor de Recursos (SRE)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
rules:
  # Recursos core: pods, nodes, namespaces, eventos e logs
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Restart de pods (delete recria via ReplicaSet)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  # Recursos apps: deployments e replicasets (Deploy Monitor + Editor SRE)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # HPA (Horizontal Pod Autoscaler) — scale via Editor SRE
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # Métricas de CPU e memória (requer metrics-server instalado)
  # Se o metrics-server não estiver disponível, o modo DEMO será ativado automaticamente
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
# 5. ClusterRoleBinding — vincula o ServiceAccount ao ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
subjects:
  - kind: ServiceAccount
    name: k8s-pod-visualizer
    namespace: k8s-pod-visualizer
roleRef:
  kind: ClusterRole
  name: k8s-pod-visualizer
  apiGroup: rbac.authorization.k8s.io

---
# 6. Deployment — sem volume, sem PVC, sem SQLite
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
    app.kubernetes.io/version: "3.0.2"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-pod-visualizer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: k8s-pod-visualizer
        app.kubernetes.io/name: k8s-pod-visualizer
        app.kubernetes.io/version: "3.0.2"
    spec:
      serviceAccountName: k8s-pod-visualizer
      # Segurança: roda como usuário não-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      # Tolerância a nodes com taints comuns (opcional — remova se não necessário)
      # tolerations:
      #   - key: "node-role.kubernetes.io/control-plane"
      #     operator: "Exists"
      #     effect: "NoSchedule"
      containers:
        - name: k8s-pod-visualizer
          image: ghcr.io/divinoandersonbastos/k8s-pod-visualizer:3.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            # Porta do servidor HTTP
            - name: PORT
              value: "3000"
            # Ambiente de execução
            - name: NODE_ENV
              value: "production"
            # URL da API do Kubernetes (padrão para in-cluster)
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            # Usa o token do ServiceAccount automaticamente
            - name: USE_SERVICE_ACCOUNT
              value: "true"
            # DESATIVA o SQLite — sem persistência de dados
            - name: DISABLE_DB
              value: "true"
            # Nome do cluster exibido no header (personalize)
            - name: CLUSTER_NAME
              value: "meu-cluster"
            # ── Autenticação JWT (v3.0) ──────────────────────────────────────
            # Chave secreta para assinar tokens JWT — lida do Secret K8s
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: k8s-pod-visualizer-secrets
                  key: jwt-secret
            # Expiração dos tokens JWT (padrão: 8h)
            # Formatos aceitos: "8h", "24h", "7d", "30d"
            - name: JWT_EXPIRES_IN
              value: "8h"
            # Intervalo de polling em ms (padrão: 5000ms = 5s)
            # - name: POLL_INTERVAL
            #   value: "5000"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/auth/setup-status
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          # Sem volumeMounts — nenhum volume necessário
      restartPolicy: Always
      # Sem volumes — nenhum PVC necessário
      terminationGracePeriodSeconds: 30

---
# 7. Service — expõe o visualizador via NodePort
apiVersion: v1
kind: Service
metadata:
  name: k8s-pod-visualizer
  namespace: k8s-pod-visualizer
  labels:
    app.kubernetes.io/name: k8s-pod-visualizer
spec:
  selector:
    app: k8s-pod-visualizer
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
      nodePort: 30080
  type: NodePort

---
